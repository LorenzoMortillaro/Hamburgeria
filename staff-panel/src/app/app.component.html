<div style="padding: 20px; font-family: sans-serif;">
  <h1>🍔 Pannello Gestione Hamburgeria</h1>

  <hr>

  <!-- SEZIONE ORDINI -->
  <h2>📋 Ordini in corso</h2>
  <table border="1" style="width: 100%; border-collapse: collapse; margin-bottom: 30px;">
    <tr style="background: #f4f4f4;">
      <th>ID</th>
      <th>Dettagli Ordine</th>
      <th>Stato</th>
      <th>Azione</th>
    </tr>
    <tr *ngFor="let o of ordini">
      <td>{{ o.id }}</td>
      <td>{{ o.dettagli }}</td>
      <td [style.color]="o.stato === 'pronto' ? 'green' : 'orange'">
        <b>{{ o.stato }}</b>
      </td>
      <td>
        <button *ngIf="o.stato === 'in corso'" (click)="preparaOrdine(o.id)">Segna come PRONTO</button>
      </td>
    </tr>
  </table>

  <hr>

  <!-- SEZIONE GESTIONE MENU -->
  <h2>🍴 Gestione Menù</h2>
  
  <!-- Form per aggiungere prodotti -->
  <div style="background: #eee; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
    <h3>Aggiungi Prodotto</h3>
    Nome: <input [(ngModel)]="nuovoProd.nome"> 
    Prezzo: <input type="number" [(ngModel)]="nuovoProd.prezzo"> 
    Cat: 
    <select [(ngModel)]="nuovoProd.categoria">
      <option value="panini">Panini</option>
      <option value="bevande">Bevande</option>
      <option value="contorni">Contorni</option>
    </select>
    <button (click)="aggiungiProdotto()">Salva nel Menù</button>
  </div>

  <!-- Lista prodotti esistenti -->
  <table border="1" style="width: 100%; border-collapse: collapse;">
    <tr style="background: #f4f4f4;">
      <th>Nome</th>
      <th>Prezzo</th>
      <th>Categoria</th>
      <th>Azione</th>
    </tr>
    <tr *ngFor="let p of prodotti">
      <td>{{ p.nome }}</td>
      <td>{{ p.prezzo | currency:'EUR' }}</td>
      <td>{{ p.categoria }}</td>
      <td><button (click)="cancellaProdotto(p.id)" style="color: red;">Elimina</button></td>
    </tr>
  </table>
</div>
